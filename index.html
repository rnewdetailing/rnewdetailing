<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator R.NEW</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Scripturi baze de date -->
    <script src="clase_masini.js"></script>
    <script src="costuri_fixe.js"></script>
    <script src="servicii_exterior.js"></script>
    <script src="servicii_interior.js"></script>
    <script src="pachete_servicii.js"></script>
    <script src="parametri_tarif.js"></script>
    <script src="stare_masina.js"></script>

    <style>
        :root {
            --albastru-rnew: #0056b3;
            --alb: #ffffff;
            --negru: #000000;
            --gri-overlay: rgba(255, 255, 255, 0.9);
            
            /* ============================================================ */
            /* SETARI POZITIONARE ECRAN (MODALITATEA NORMALA)               */
            /* ============================================================ */
            --screen-logo-x: 0px;      /* Miscare logo stanga/dreapta pe ecran */
            --screen-logo-y: 0px;      /* Miscare logo sus/jos pe ecran */
            --screen-tables-x: 0px;    /* Miscare tabele stanga/dreapta pe ecran */
            --screen-logo-width: 220px; /* Latime logo pe ecran */

            /* ============================================================ */
            /* SETARI POZITIONARE PRINT (PDF)                               */
            /* ============================================================ */
            --print-logo-x: 0px;       /* Miscare logo stanga/dreapta la print */
            --print-logo-y: 0px;       /* Miscare logo sus/jos la print */
            --print-tables-x: 0px;     /* Miscare tabele stanga/dreapta la print */
            --print-logo-width: 180px; /* Latime logo la print */
            /* ============================================================ */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: url('fundal.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 0;
        }

        .overlay { background: rgba(0, 0, 0, 0.05); min-height: 100vh; padding-bottom: 50px; }

        /* --- ANTET FLEXIBIL --- */
        header {
            background-color: var(--albastru-rnew);
            color: var(--alb);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header-controls { display: flex; gap: 8px; flex: 1; }
        .btn-ctrl { 
            background: rgba(255,255,255,0.2); border: 1px solid white; color: white; 
            padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 16px;
        }
        .btn-pdf { background: #28a745; font-weight: bold; }

        .logo-section { 
            flex: 1; 
            text-align: center;
            transform: translate(var(--screen-logo-x), var(--screen-logo-y));
        }
        .logo-img { width: var(--screen-logo-width); height: auto; }

        .header-tables { 
            display: flex; 
            gap: 10px; 
            flex: 1; 
            justify-content: flex-end;
            transform: translateX(var(--screen-tables-x));
        }
        .mini-table {
            background: var(--alb); color: var(--negru);
            border-radius: 8px; padding: 8px; font-size: 11px;
            border: 2px solid var(--albastru-rnew); min-width: 195px;
        }
        .mini-table table { width: 100%; border-collapse: collapse; }
        .result-val { font-weight: bold; color: var(--albastru-rnew); text-align: right; }

        /* --- INFO CLIENT --- */
        .client-info-card {
            max-width: 1200px; margin: 20px auto; padding: 15px;
            background: var(--gri-overlay); border-radius: 12px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .client-input-group { display: flex; flex-direction: column; }
        .client-input-group label { font-size: 10px; font-weight: bold; color: var(--albastru-rnew); margin-bottom: 4px; }
        .client-input-group input { 
            padding: 10px; border: 1px solid #ccc; border-radius: 5px; 
            font-family: inherit; font-size: 13px; font-style: italic;
        }

        /* --- GRILA SERVICII --- */
        main { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            max-width: 1200px; margin: auto; padding: 0 10px;
        }
        .card-tabel { 
            background: var(--gri-overlay); border-radius: 12px; padding: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        .card-tabel h2 { 
            margin-top: 0; color: var(--albastru-rnew); font-size: 16px; 
            border-bottom: 2px solid var(--albastru-rnew); padding-bottom: 5px;
        }
        .service-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 6px 4px; border-bottom: 1px solid #ddd; font-size: 12px; 
        }
        .srv-info { font-size: 11px; color: var(--albastru-rnew); font-weight: 700; }

        /* --- PRINT --- */
        @media print {
            header { 
                position: static !important; 
                display: flex !important; 
                justify-content: space-between !important;
                background-color: var(--albastru-rnew) !important;
                -webkit-print-color-adjust: exact;
            }
            .header-controls, .no-print { display: none !important; }
            
            .logo-section { 
                text-align: left !important;
                transform: translate(var(--print-logo-x), var(--print-logo-y)) !important;
                flex: 1;
            }
            .logo-img { width: var(--print-logo-width) !important; }
            
            .header-tables { 
                transform: translateX(var(--print-tables-x)) !important;
                flex: 1;
                justify-content: flex-end;
            }
            
            .overlay { background: none !important; }
            body { background: white !important; }
            .card-tabel { box-shadow: none !important; border: 1px solid #eee; background: white !important; }
        }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <div class="header-controls no-print">
            <button class="btn-ctrl" onclick="location.reload()">🔄</button>
            <button class="btn-ctrl btn-pdf" onclick="window.print()">🖨️</button>
        </div>

        <div class="logo-section">
            <img src="logo.png" alt="R.NEW" class="logo-img">
        </div>

        <div class="header-tables">
            <div class="mini-table">
                <table>
                    <tr><td>Clasă:</td><td><select id="selClasa" onchange="calculate()"></select></td></tr>
                    <tr><td>Stare:</td><td><select id="selStare" onchange="calculate()"></select></td></tr>
                    <tr><td>Pachet:</td><td><select id="selPachet" onchange="applyPackage()"></select></td></tr>
                    <tr class="no-print"><td>Tarif Oră:</td><td class="result-val"><span id="outTarifOra">0</span> RON</td></tr>
                </table>
            </div>
            <div class="mini-table">
                <table>
                    <tr><td>Ore Totale:</td><td class="result-val"><span id="outOre">0</span>h</td></tr>
                    <tr><td>Materiale:</td><td class="result-val"><span id="outMat">0</span> RON</td></tr>
                    <tr><td>Subtotal:</td><td class="result-val"><span id="outSub">0</span> RON</td></tr>
                    <tr><td>Discount:</td><td class="result-val" style="color:green">-<span id="outDisc">0</span> RON</td></tr>
                    <tr><td>Preț Final:</td><td class="result-val" style="color:red; font-size:1.1em;"><span id="outFinal">0</span> RON</td></tr>
                </table>
            </div>
        </div>
    </header>

    <div class="client-info-card">
        <div class="client-input-group"><label>NUME CLIENT / FIRMĂ:</label><input type="text" placeholder="Nume Client"></div>
        <div class="client-input-group"><label>MARCĂ / MODEL AUTO:</label><input type="text" placeholder="Model Auto"></div>
        <div class="client-input-group"><label>NR. ÎNMATRICULARE:</label><input type="text" placeholder="B-01-ABC"></div>
    </div>

    <main>
        <div class="card-tabel"><h2>Servicii exterior</h2><div id="listExterior"></div></div>
        <div class="card-tabel"><h2>Servicii interior</h2><div id="listInterior"></div></div>
    </main>
</div>

<script>
let db = {
    clase: typeof data_clase !== 'undefined' ? data_clase : [],
    costuri: typeof data_costuri !== 'undefined' ? data_costuri : [],
    exterior: typeof data_exterior !== 'undefined' ? data_exterior : [],
    interior: typeof data_interior !== 'undefined' ? data_interior : [],
    pachete: typeof data_pachete !== 'undefined' ? data_pachete : [],
    parametri: typeof data_parametri !== 'undefined' ? data_parametri : [],
    stare: typeof data_stare !== 'undefined' ? data_stare : []
};

function parseRO(val) {
    if (!val) return 0;
    return parseFloat(val.toString().replace(',', '.')) || 0;
}

window.onload = () => {
    const selClasa = document.getElementById('selClasa');
    db.clase.forEach(c => {
        let nume = c.clasa || c.Clasa;
        let coef = c.coeficient || c.Coeficient;
        if(nume) selClasa.innerHTML += `<option value="${coef}">${nume}</option>`;
    });

    const selStare = document.getElementById('selStare');
    db.stare.forEach(s => {
        let nume = s.stare || s.Stare;
        let coef = s.coef_stare || s.coef_Stare;
        if(nume) selStare.innerHTML += `<option value="${coef}">${nume}</option>`;
    });

    const selPachet = document.getElementById('selPachet');
    selPachet.innerHTML = `<option value="custom">Custom</option>`;
    db.pachete.forEach(p => {
        if(p.nume_pachet) selPachet.innerHTML += `<option value="${p.nume_pachet}">${p.nume_pachet}</option>`;
    });

    renderList('listExterior', db.exterior, 'ext');
    renderList('listInterior', db.interior, 'int');
    calculate();
};

function renderList(id, data, prefix) {
    const container = document.getElementById(id);
    data.forEach((s, i) => {
        if(!s.serviciu) return;
        container.innerHTML += `
            <div class="service-row">
                <label><input type="checkbox" class="srv-check" data-type="${prefix}" data-idx="${i}" onchange="calculate()"> ${s.serviciu}</label>
                <span class="srv-info" id="info-${prefix}-${i}"></span>
            </div>`;
    });
}

function calculate() {
    let totalOre = 0, totalMat = 0;
    const coefClasa = parseRO(document.getElementById('selClasa').value) || 1;
    const coefStare = parseRO(document.getElementById('selStare').value) || 1;

    let costFix = 0;
    db.costuri.forEach(c => costFix += parseRO(c.suma || c.Suma));
    
    const sal = parseRO(db.parametri.find(p => p.parametru === 'salariu_dorit')?.valoare || 10000);
    const oreL = parseRO(db.parametri.find(p => p.parametru === 'ore_lucrate')?.valoare || 160);
    const marja = parseRO(db.parametri.find(p => p.parametru === 'marja_profit')?.valoare || 20);
    
    const tarifOra = ((costFix + sal) / oreL) * (1 + (marja / 100));
    document.getElementById('outTarifOra').innerText = tarifOra.toFixed(0);

    document.querySelectorAll('.srv-check').forEach(el => {
        if (el.checked) {
            const type = el.dataset.type;
            const idx = el.dataset.idx;
            const item = db[type === 'ext' ? 'exterior' : 'interior'][idx];
            
            const isM = (item.multiplicabil === "da" || item.multiplicabil === "DA");
            let ore = isM ? (parseRO(item.ore_lucru) * coefClasa * coefStare) : parseRO(item.ore_lucru);
            let mat = isM ? (parseRO(item.consumabile) * coefClasa * coefStare) : parseRO(item.consumabile);
            
            totalOre += ore;
            totalMat += mat;
            document.getElementById(`info-${type}-${idx}`).innerText = ore.toFixed(1) + 'h';
        } else {
            document.getElementById(`info-${el.dataset.type}-${el.dataset.idx}`).innerText = '';
        }
    });

    const subtotal = (totalOre * tarifOra) + totalMat;
    const pNume = document.getElementById('selPachet').value;
    const pachet = db.pachete.find(x => x.nume_pachet === pNume);
    const discount = subtotal * (parseRO(pachet?.discount_procent) / 100);

    document.getElementById('outOre').innerText = totalOre.toFixed(1);
    document.getElementById('outMat').innerText = totalMat.toFixed(0);
    document.getElementById('outSub').innerText = subtotal.toFixed(0);
    document.getElementById('outDisc').innerText = discount.toFixed(0);
    document.getElementById('outFinal').innerText = (subtotal - discount).toFixed(0);
}

function applyPackage() {
    const pNume = document.getElementById('selPachet').value;
    const pachet = db.pachete.find(x => x.nume_pachet === pNume);
    
    document.querySelectorAll('.srv-check').forEach(el => {
        const servNume = db[el.dataset.type === 'ext' ? 'exterior' : 'interior'][el.dataset.idx].serviciu;
        el.checked = pachet ? pachet.servicii_incluse.includes(servNume) : false;
    });
    calculate();
}
</script>

</body>
</html>
