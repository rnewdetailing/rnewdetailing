<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator R.NEW</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="clase_masini.js"></script>
    <script src="costuri_fixe.js"></script>
    <script src="servicii_exterior.js"></script>
    <script src="servicii_interior.js"></script>
    <script src="pachete_servicii.js"></script>
    <script src="parametri_tarif.js"></script>
    <script src="stare_masina.js"></script>

    <style>
        * { box-sizing: border-box; }

        :root {
            --albastru-rnew: #0056b3;
            --alb: #ffffff;
            --negru: #000000;
            --gri-overlay: rgba(255, 255, 255, 0.9);
              /* ============================================================ */
            /* SETARI POZITIONARE ECRAN (MODALITATEA NORMALA)               */
            /* ============================================================ */
            --screen-logo-x: 0px;      /* Miscare logo stanga/dreapta pe ecran */
            --screen-logo-y: 0px;      /* Miscare logo sus/jos pe ecran */
            --screen-tables-x: 0px;    /* Miscare tabele stanga/dreapta pe ecran */
            --screen-logo-width: 280px; /* Latime logo pe ecran */
			--titlu-padding-x: 10px; /* Modifică aici valoarea pentru a muta titlurile la stânga/dreapta */
			--srv-info-margin-right: 15px; /* Cu cât e mai mare numărul, cu atât timpul se mută mai la stânga (spre text) */
			--titlu-tabele-x: 10px; /* 0px e centrat/stânga standard. Pune valori cu minus (ex: -10px) pentru stânga sau plus pentru dreapta */

            /* ============================================================ */
            /* SETARI POZITIONARE PRINT (PDF)                               */
            /* ============================================================ */
            --print-logo-x: -10px;       /* Miscare logo stanga/dreapta la print */
            --print-logo-y: 0px;       /* Miscare logo sus/jos la print */
            --print-tables-x: 0px;     /* Miscare tabele stanga/dreapta la print */
            --print-logo-width: 180px; /* Latime logo la print */
            /* ============================================================ */
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: url('fundal.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 0;
        }

        .overlay { background: rgba(0, 0, 0, 0.1); min-height: 100vh; padding-bottom: 0px; }

        header {
            background-color: var(--albastru-rnew);
            color: var(--alb);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* STANGA: Logo */
        .logo-section { flex: 1; display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 160px; height: auto; }
       

        /* CENTRU: Cele 2 Tabele Originale */
        .header-tables { flex: 2; display: flex; justify-content: center; gap: 15px; }
        .mini-table {
            background: var(--alb); color: var(--negru);
            border-radius: 8px; padding: 8px; font-size: 11px;
            border: 2px solid var(--albastru-rnew); min-width: 220px;
        }
        .mini-table table { width: 100%; border-collapse: collapse; }
        .result-val { font-weight: bold; color: var(--albastru-rnew); text-align: right; }

        /* DREAPTA: Butoane */
        .header-actions { flex: 1; display: flex; justify-content: flex-end; gap: 10px; }
        .btn-ctrl { padding: 8px 8px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .btn-9 { background: #28a745; color: white; }
        .btn-reset { background: #f8f9fa; color: #333; }

        /* CHENAR CLIENT - Sincronizat la 1200px */
        .client-info-card {
            max-width: 1200px; margin: 20px auto; padding: 15px 20px;
            background: var(--gri-overlay); border-radius: 12px;
            display: grid; 
            grid-template-columns: 1.5fr 1.5fr 0.7fr; /* Nr inmatriculare mai mic */
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .client-input-group { display: flex; flex-direction: column; }
        .client-input-group label { font-size: 10px; font-weight: bold; color: var(--albastru-rnew); margin-bottom: 4px; text-transform: uppercase; }
        .client-input-group input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; font-size: 14px; }

        /* TABELE SERVICII - Sincronizate la 1200px */
        main { 
            padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            max-width: 1200px; margin: 0 auto;
        }
        .card-tabel { background: var(--gri-overlay); border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card-tabel h2 { margin-top: 0; color: var(--albastru-rnew); font-size: 18px; border-bottom: 2px solid var(--albastru-rnew); padding-bottom: 5px; padding-left: var(--titlu-tabele-x); }
        .service-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #ddd; font-size: 13.5px; }
        .srv-info { font-size: 11px; color: var(--albastru-rnew); font-weight: 700; margin-left: 10px; margin-right: var(--srv-info-margin-right); }
		
		footer {
            background-color: var(--albastru-rnew);
            color: var(--alb);
            text-align: center;
            padding: 12px 0; /* Îl face puțin mai înalt decât textul */
            font-size: 11px; /* Puțin mai mare decât 9 */
            width: 100%;
            margin-top: 30px; /* Spațiu față de tabelele de mai sus */
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1); /* Umbră fină în partea de sus */
        }
        footer b { font-weight: 700; }
        footer i { font-style: italic; opacity: 0.9; }
		
		
        @media print {
            header { 
                position: static !important; 
                display: flex !important; 
                justify-content: space-between !important;
                background-color: var(--albastru-rnew) !important;
                -webkit-print-color-adjust: exact;
            }
            .header-controls, .no-print { display: none !important; }
            
            .logo-section { 
                text-align: left !important;
                transform: translate(var(--print-logo-x), var(--print-logo-y)) !important;
                flex: 1;
            }
            .logo-img { width: var(--print-logo-width) !important; }
            
            .header-tables { 
                transform: translateX(var(--print-tables-x)) !important;
                flex: 1;
                justify-content: flex-end;
            }
            
            .overlay { background: none !important; }
            body { background: white !important; }
            .card-tabel { box-shadow: none !important; border: 1px solid #eee; background: white !important; }
			
			footer {
                background-color: var(--albastru-rnew) !important;
                -webkit-print-color-adjust: exact;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <div class="logo-section">
            <img src="logo.png" alt="R.NEW" class="logo-img">
        </div>

        <div class="header-tables">
            <div class="mini-table">
                <table>
                    <tr><td>Clasă Auto:</td><td><select id="selClasa" onchange="calculate()"></select></td></tr>
                    <tr><td>Stare Mașină:</td><td><select id="selStare" onchange="calculate()"></select></td></tr>
                    <tr><td>Pachet Servicii:</td><td><select id="selPachet" onchange="applyPackage()"></select></td></tr>
                    <tr><td>Tarif Oră:</td><td class="result-val"><span id="outTarifOra">0</span> RON</td></tr>
                </table>
            </div>
            <div class="mini-table">
                <table>
                    <tr><td>Ore Totale:</td><td class="result-val"><span id="outOre">0</span> h</td></tr>
                    <tr><td>Materiale:</td><td class="result-val"><span id="outMat">0</span> RON</td></tr>
                    <tr><td>Subtotal:</td><td class="result-val"><span id="outSub">0</span> RON</td></tr>
                    <tr><td>Discount Pachet:</td><td class="result-val" style="color:green">-<span id="outDisc">0</span> RON</td></tr>
                    <tr><td>Preț Final:</td><td class="result-val" style="color:red; font-size:1.1em;"><span id="outFinal">0</span> RON</td></tr>
                </table>
            </div>
        </div>

        <div class="header-actions no-print">
            <button class="btn-ctrl btn-print" onclick="window.print()">🖨️</button>
            <button class="btn-ctrl btn-reset" onclick="location.reload()">🔄</button>
        </div>
    </header>

    <div class="client-info-card">
        <div class="client-input-group">
            <label>Nume Client / Firmă:</label>
            <input type="text" placeholder="Numele clientului...">
        </div>
        <div class="client-input-group">
            <label>Marcă / Model Auto:</label>
            <input type="text" placeholder="Ex: Audi A6 Quartz Gray">
        </div>
        <div class="client-input-group">
            <label>Nr. Înmatriculare:</label>
            <input type="text" placeholder="B-01-NEW">
        </div>
    </div>

    <main>
        <div class="card-tabel"><h2>Servicii exterior</h2><div id="listExterior"></div></div>
        <div class="card-tabel"><h2>Servicii interior</h2><div id="listInterior"></div></div>
    </main>
	<footer>
        <b>2026 - R.NEW</b> <i>by easystoreit</i>
    </footer>
</div>

<script>
let db = {
    clase: typeof data_clase !== 'undefined' ? data_clase : [],
    costuri: typeof data_costuri !== 'undefined' ? data_costuri : [],
    exterior: typeof data_exterior !== 'undefined' ? data_exterior : [],
    interior: typeof data_interior !== 'undefined' ? data_interior : [],
    pachete: typeof data_pachete !== 'undefined' ? data_pachete : [],
    parametri: typeof data_parametri !== 'undefined' ? data_parametri : [],
    stare: typeof data_stare !== 'undefined' ? data_stare : []
};

function parseRO(val) {
    if (val === undefined || val === null || val === "") return 0;
    if (typeof val === 'number') return val;
    let stringVal = val.toString().replace(',', '.');
    return parseFloat(stringVal) || 0;
}

window.onload = initApp;

function initApp() {
    // 1. Configurare Clasă Auto
    const selClasa = document.getElementById('selClasa');
    // Adăugăm opțiunea default
    selClasa.innerHTML = `<option value="0">Selectați clasa</option>`;
    db.clase.forEach(c => { 
        selClasa.innerHTML += `<option value="${c.coeficient || c.Coeficient}">${c.clasa || c.Clasa}</option>`; 
    });

    // 2. Configurare Stare Mașină
    const selStare = document.getElementById('selStare');
    // Adăugăm opțiunea default
    selStare.innerHTML = `<option value="0">Selectați starea</option>`;
    db.stare.forEach(s => { 
        selStare.innerHTML += `<option value="${s.coef_stare || s.coef_Stare}">${s.stare || s.Stare}</option>`; 
    });

    const selPachet = document.getElementById('selPachet');
    selPachet.innerHTML = `<option value="0">Selectați pachet</option>`;
    db.pachete.forEach(p => selPachet.innerHTML += `<option value="${p.nume_pachet}">${p.nume_pachet}</option>`);

    renderList('listExterior', db.exterior, 'ext');
    renderList('listInterior', db.interior, 'int');
    calculate();
}

function renderList(containerId, data, prefix) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    data.forEach((s, i) => {
        if(!s.serviciu) return;
        container.innerHTML += `
            <div class="service-row">
                <label>
                    <input type="checkbox" class="srv-check" data-type="${prefix}" data-idx="${i}" onchange="calculate()"> 
                    ${s.serviciu}
                </label>
                <span class="srv-info" id="info-${prefix}-${i}"></span>
            </div>`;
    });
}

function calculate() {
    let totalOre = 0, totalMat = 0;
    const coefClasa = parseRO(document.getElementById('selClasa').value);
    const coefStare = parseRO(document.getElementById('selStare').value);

    let sumaCosturiFixe = 0;
    let sursaCosturi = (typeof data_costuri !== 'undefined') ? data_costuri : db.costuri;
    sursaCosturi.forEach(item => { sumaCosturiFixe += parseRO(item.suma); });

    let sursaParametri = (typeof data_parametri !== 'undefined') ? data_parametri : db.parametri;
    const salariuDorit = parseRO(sursaParametri.find(p => p.parametru === 'salariu_dorit')?.valoare || 10000);
    const oreLucrate = parseRO(sursaParametri.find(p => p.parametru === 'ore_lucrate')?.valoare || 160);
    const marjaProfit = parseRO(sursaParametri.find(p => p.parametru === 'marja_profit')?.valoare || 20);

    const tarifOraBaza = (sumaCosturiFixe + salariuDorit) / oreLucrate;
    const tarifOraFinal = tarifOraBaza * (1 + (marjaProfit / 100));

    document.getElementById('outTarifOra').innerText = tarifOraFinal.toFixed(2);

    document.querySelectorAll('.srv-check').forEach(el => {
        const type = el.dataset.type;
        const idx = parseInt(el.dataset.idx);
        const s = db[type === 'ext' ? 'exterior' : 'interior'][idx];
        const infoSpan = document.getElementById(`info-${type}-${idx}`);
        const isMult = (s.multiplicabil === "da" || s.multiplicabil === "DA" || s.multiplicabil === 1);
        
        let oreSrv = isMult ? (parseRO(s.ore_lucru) * coefClasa * coefStare) : parseRO(s.ore_lucru);
        let matSrv = isMult ? (parseRO(s.consumabile) * coefClasa * coefStare) : parseRO(s.consumabile);

        if (el.checked) {
            totalOre += oreSrv;
            totalMat += matSrv;
            infoSpan.innerText = `${oreSrv.toFixed(1)}h`; // DOAR TIMPUL
            infoSpan.style.display = "inline";
        } else {
            infoSpan.style.display = "none";
        }
    });

    const subtotal = (totalOre * tarifOraFinal) + totalMat;
    const pachetNume = document.getElementById('selPachet').value;
    const pachet = db.pachete.find(p => p.nume_pachet === pachetNume);
    const procDisc = parseRO(pachet?.discount_procent);
    const valoareDiscount = subtotal * (procDisc / 100);
    const pretFinal = subtotal - valoareDiscount;

    document.getElementById('outOre').innerText = totalOre.toFixed(1);
    document.getElementById('outMat').innerText = totalMat.toFixed(0);
    document.getElementById('outSub').innerText = subtotal.toFixed(0);
    document.getElementById('outDisc').innerText = valoareDiscount.toFixed(0);
    document.getElementById('outFinal').innerText = pretFinal.toFixed(0);
}

function applyPackage() {
    const pachetNume = document.getElementById('selPachet').value;
    const pachet = db.pachete.find(p => p.nume_pachet === pachetNume);
    document.querySelectorAll('.srv-check').forEach(el => {
        const s = db[el.dataset.type === 'ext' ? 'exterior' : 'interior'][parseInt(el.dataset.idx)];
        el.checked = pachet?.servicii_incluse ? pachet.servicii_incluse.includes(s.serviciu) : false;
    });
    calculate();
}
</script>
</body>
</html>
