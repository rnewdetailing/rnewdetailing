<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator R.NEW</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Scripturi baze de date -->
    <script src="clase_masini.js"></script>
    <script src="costuri_fixe.js"></script>
    <script src="servicii_exterior.js"></script>
    <script src="servicii_interior.js"></script>
    <script src="pachete_servicii.js"></script>
    <script src="parametri_tarif.js"></script>
    <script src="stare_masina.js"></script>

    <style>
        :root {
            --albastru-rnew: #0056b3;
            --alb: #ffffff;
            --negru: #000000;
            --gri-overlay: rgba(255, 255, 255, 0.9);
            --titlu-x: 7px; --titlu-y: 0px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: url('fundal.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 0;
        }

        .overlay { background: rgba(0, 0, 0, 0.1); min-height: 100vh; }

        header {
            background-color: var(--albastru-rnew);
            color: var(--alb);
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo-img { width: 180px; height: auto; }
        .titlu-configurator { font-weight: 700; transform: translate(var(--titlu-x), var(--titlu-y)); }

        .header-tables { display: flex; gap: 10px; }
        .mini-table {
            background: var(--alb); color: var(--negru);
            border-radius: 8px; padding: 8px; font-size: 11px;
            border: 2px solid var(--albastru-rnew); min-width: 210px;
        }
        .mini-table table { width: 100%; border-collapse: collapse; }
        .result-val { font-weight: bold; color: var(--albastru-rnew); text-align: right; }

        main { 
            padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            max-width: 1400px; margin: auto;
        }

        .card-tabel { 
            background: var(--gri-overlay); border-radius: 12px; padding: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }

        .service-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border-bottom: 1px solid #ddd; font-size: 13.5px;
        }

        .srv-info { font-size: 11px; color: var(--albastru-rnew); font-weight: 700; margin-left: 10px; }

        .actions { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        button { padding: 12px 20px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        .btn-profit { background: #ffc107; }
        .btn-settings { background: #6c757d; color: white; }
        #settingsPanel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <div class="logo-section">
            <img src="logo.png" alt="R.NEW" class="logo-img">
            <div class="titlu-configurator" id="mainTitle">Configurator servicii</div>
        </div>

        <div class="header-tables">
            <div class="mini-table">
                <table>
                    <tr><td>Clasă:</td><td><select id="selClasa" onchange="calculate()"></select></td></tr>
                    <tr><td>Stare:</td><td><select id="selStare" onchange="calculate()"></select></td></tr>
                    <tr><td>Pachet:</td><td><select id="selPachet" onchange="applyPackage()"></select></td></tr>
                    <tr><td>Tarif Oră:</td><td class="result-val"><span id="outTarifOra">0</span> RON</td></tr>
                </table>
            </div>
            <div class="mini-table">
                <table>
                    <tr><td>Ore Totale:</td><td class="result-val"><span id="outOre">0</span>h</td></tr>
                    <tr><td>Materiale:</td><td class="result-val"><span id="outMat">0</span> RON</td></tr>
                    <tr><td>Subtotal:</td><td class="result-val"><span id="outSub">0</span> RON</td></tr>
                    <!-- RANDUL DE DISCOUNT ADAUGAT AICI -->
                    <tr><td>Discount Pachet:</td><td class="result-val" style="color:green">-<span id="outDisc">0</span> RON</td></tr>
                    <tr><td>Preț Final:</td><td class="result-val" style="color:red; font-size:1.1em;"><span id="outFinal">0</span> RON</td></tr>
                </table>
            </div>
        </div>
    </header>

    <main>
        <div class="card-tabel"><h2>Servicii exterior</h2><div id="listExterior"></div></div>
        <div class="card-tabel"><h2>Servicii interior</h2><div id="listInterior"></div></div>
    </main>

    <div class="actions">
        <div id="profitBadge" style="display:none; background:#28a745; color:white; padding:10px; border-radius:10px; font-weight:bold;">Profit: <span id="valProfit">0</span> RON</div>
              <button class="btn-reset" onclick="location.reload()">🔄</button>
    </div>
</div>

<div id="settingsPanel">
    <h3>Setări Interfață</h3>
    <label>Titlu X:</label> <input type="range" min="-100" max="500" value="0" oninput="moveTitle('x', this.value)"><br>
    <label>Titlu Y:</label> <input type="range" min="-50" max="50" value="0" oninput="moveTitle('y', this.value)"><br><br>
    <button onclick="toggleSettings()" style="width:100%">Închide</button>
</div>

<script>
let db = {
    clase: typeof data_clase !== 'undefined' ? data_clase : [],
    costuri: typeof data_costuri !== 'undefined' ? data_costuri : [],
    exterior: typeof data_exterior !== 'undefined' ? data_exterior : [],
    interior: typeof data_interior !== 'undefined' ? data_interior : [],
    pachete: typeof data_pachete !== 'undefined' ? data_pachete : [],
    parametri: typeof data_parametri !== 'undefined' ? data_parametri : [],
    stare: typeof data_stare !== 'undefined' ? data_stare : []
};

// FUNCȚIE CRITICĂ: Transformă "1,5" sau "1.5" în număr real 1.5
function parseRO(val) {
    if (val === undefined || val === null || val === "") return 0;
    if (typeof val === 'number') return val;
    let stringVal = val.toString().replace(',', '.');
    return parseFloat(stringVal) || 0;
}

window.onload = initApp;

function initApp() {
    const selClasa = document.getElementById('selClasa');
    db.clase.forEach(c => {
        let val = c.coeficient || c.Coeficient;
        let txt = c.clasa || c.Clasa;
        selClasa.innerHTML += `<option value="${val}">${txt}</option>`;
    });

    const selStare = document.getElementById('selStare');
    db.stare.forEach(s => {
        let val = s.coef_stare || s.coef_Stare; // Acoperă ambele variante de scriere
        let txt = s.stare || s.Stare;
        selStare.innerHTML += `<option value="${val}">${txt}</option>`;
    });

    const selPachet = document.getElementById('selPachet');
    selPachet.innerHTML = `<option value="custom">Custom</option>`;
    db.pachete.forEach(p => selPachet.innerHTML += `<option value="${p.nume_pachet}">${p.nume_pachet}</option>`);

    renderList('listExterior', db.exterior, 'ext');
    renderList('listInterior', db.interior, 'int');
    calculate();
}

function renderList(containerId, data, prefix) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    data.forEach((s, i) => {
        if(!s.serviciu) return; // Sare peste intrările goale
        container.innerHTML += `
            <div class="service-row">
                <label>
                    <input type="checkbox" class="srv-check" data-type="${prefix}" data-idx="${i}" onchange="calculate()"> 
                    ${s.serviciu}
                </label>
                <span class="srv-info" id="info-${prefix}-${i}"></span>
            </div>`;
    });
}

function calculate() {
    let totalOre = 0;
    let totalMat = 0;
    
    const coefClasa = parseRO(document.getElementById('selClasa').value);
    const coefStare = parseRO(document.getElementById('selStare').value);

    // --- CALCUL TARIF ORAR (LOGICA EXCEL) ---
    
    // --- CALCUL TARIF ORAR (LOGICA EXCEL) ---

	// J12: Suma Costuri Fixe
	let sumaCosturiFixe = 0;
	// Verificăm dacă folosim variabila corectă din fișierul extern
	let sursaCosturi = (typeof data_costuri !== 'undefined') ? data_costuri : db.costuri;
	sursaCosturi.forEach(item => {
		sumaCosturiFixe += parseRO(item.suma);
	});

	// J13: Salariu Dorit
	let sursaParametri = (typeof data_parametri !== 'undefined') ? data_parametri : db.parametri;
	const paramSalariu = sursaParametri.find(p => p.parametru === 'salariu_dorit');
	const salariuDorit = parseRO(paramSalariu ? paramSalariu.valoare : 10000);

	// J14: Ore Lucrate
	const paramOre = sursaParametri.find(p => p.parametru === 'ore_lucrate');
	const oreLucrate = parseRO(paramOre ? paramOre.valoare : 160);

	// J15: Marja Profit
	const paramMarja = sursaParametri.find(p => p.parametru === 'marja_profit');
	const marjaProfit = parseRO(paramMarja ? paramMarja.valoare : 20);

	// DEBUG: Descarcă consola (F12) să vezi aceste valori dacă tot nu merge
	console.log("Costuri Fixe:", sumaCosturiFixe); 
	console.log("Salariu:", salariuDorit);

	// FORMULA FINALA
	const tarifOraBaza = (sumaCosturiFixe + salariuDorit) / oreLucrate;
	const tarifOraFinal = tarifOraBaza * (1 + (marjaProfit / 100));

	document.getElementById('outTarifOra').innerText = tarifOraFinal.toFixed(2);
    // ----------------------------------------

    // Calcul restul serviciilor...
    document.querySelectorAll('.srv-check').forEach(el => {
        const type = el.dataset.type;
        const idx = parseInt(el.dataset.idx);
        const s = db[type === 'ext' ? 'exterior' : 'interior'][idx];
        const infoSpan = document.getElementById(`info-${type}-${idx}`);

        const isMult = (s.multiplicabil === "da" || s.multiplicabil === "DA" || s.multiplicabil === 1);
        
        // Aplicăm coeficienții pe ORE și MATERIALE (așa cum ai cerut)
        let oreSrv = isMult ? (parseRO(s.ore_lucru) * coefClasa * coefStare) : parseRO(s.ore_lucru);
        let matSrv = isMult ? (parseRO(s.consumabile) * coefClasa * coefStare) : parseRO(s.consumabile);
        
        let pretSrv = (oreSrv * tarifOraFinal) + matSrv;

        if (el.checked) {
            totalOre += oreSrv;
            totalMat += matSrv;
            infoSpan.innerText = `${oreSrv.toFixed(1)}h | ${pretSrv.toFixed(0)} RON`;
            infoSpan.style.display = "inline";
        } else {
            infoSpan.style.display = "none";
        }
    });

    // Subtotal, Discount și Final (rămân la fel)
    const subtotal = (totalOre * tarifOraFinal) + totalMat;
    const pachetNume = document.getElementById('selPachet').value;
    const pachet = db.pachete.find(p => p.nume_pachet === pachetNume);
    const procDisc = parseRO(pachet?.discount_procent);
    const valoareDiscount = subtotal * (procDisc / 100);
    const pretFinal = subtotal - valoareDiscount;

    document.getElementById('outOre').innerText = totalOre.toFixed(1);
    document.getElementById('outMat').innerText = totalMat.toFixed(0);
    document.getElementById('outSub').innerText = subtotal.toFixed(0);
    document.getElementById('outDisc').innerText = valoareDiscount.toFixed(0);
    document.getElementById('outFinal').innerText = pretFinal.toFixed(0);

}

function applyPackage() {
    const pachetNume = document.getElementById('selPachet').value;
    const pachet = db.pachete.find(p => p.nume_pachet === pachetNume);

    document.querySelectorAll('.srv-check').forEach(el => {
        const type = el.dataset.type;
        const idx = parseInt(el.dataset.idx);
        const s = db[type === 'ext' ? 'exterior' : 'interior'][idx];
        
        if (pachet && pachet.servicii_incluse) {
            // Verifică dacă numele serviciului se află în lista pachetului
            el.checked = pachet.servicii_incluse.includes(s.serviciu);
        } else {
            el.checked = false;
        }
    });
    calculate();
}
</script>
</body>
</html>
